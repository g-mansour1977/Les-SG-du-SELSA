<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recherche par Section</title>

<style>
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #eef2ff, #ffffff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .container {
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    width: 350px;
    text-align: center;
  }

  /* 🔥 LOGO */
  .logo {
    width: 100px;
    height: 100px;
    object-fit: contain;
    border-radius: 50%;
    margin-bottom: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }

  h2 {
    margin-bottom: 15px;
  }

  .info {
    background: #fff3cd;
    padding: 10px;
    border-left: 5px solid #ffc107;
    font-size: 14px;
    margin-bottom: 15px;
    border-radius: 8px;
  }

  input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    margin-bottom: 10px;
    font-size: 16px;
  }

  button {
    width: 100%;
    padding: 12px;
    background: #4f46e5;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    background: #4338ca;
  }

  .result {
    margin-top: 15px;
    padding: 15px;
    border-radius: 10px;
    background: #f1f5f9;
    display: none;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .error {
    color: red;
  }
</style>
</head>

<body>

<div class="container">

  <!-- 🔥 LOGO ICI -->
  <img src="logo SELS A.png" alt="Logo SELS/A" class="logo">

  <div class="info">
    ⚠️ Recherchez un contact par SECTION (ex: THIAROYE, DAKAR, KOLDA)
  </div>

  <h2>🔍 Recherche</h2>

  <input type="text" id="section" placeholder="Tapez une section..." oninput="autoSearch()">

  <button onclick="rechercher()">Rechercher</button>

  <div id="result" class="result"></div>

function afficherResult(info, section) {
  const resultDiv = document.getElementById("result");
  resultDiv.style.display = "block";

  if (info) {
    resultDiv.innerHTML = `👤 <strong>${info[0]}</strong><br>📞 <strong>${info[1]}</strong>`;
    resultDiv.classList.remove("error");
  } else {
    resultDiv.innerHTML = `❌ Section <strong>${section}</strong> introuvable.`;
    resultDiv.classList.add("error");
  }
}

function rechercher() {
  const section = document.getElementById("section").value.trim().toUpperCase();
  afficherResult(contacts[section], section);
}

function autoSearch() {
  const section = document.getElementById("section").value.trim().toUpperCase();

  if (section.length >= 3) {
    afficherResult(contacts[section], section);
  } else {
    document.getElementById("result").style.display = "none";
  }
}
